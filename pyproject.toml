[tool.uv.workspace]
members = [
    "dispatch",
    "worker",
]

[dependency-groups]
dev = [
    "pyrefly>=1.1",
    "pytest>=8.4",
    "ruff>=0.15",
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "UP", "B", "SIM", "ARG", "I", "RUF"]

[tool.pytest.ini_options]
testpaths = ["dispatch/tests"]

[tool.pyrefly]
project-includes = ["**/*.py*"]

# workaround for https://github.com/facebook/pyrefly/issues/2667
disable-project-excludes-heuristics = true
project-excludes = [
    "**/__pycache__",
    ".venv/**/*",
]
