name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --locked

      - run: uv run ruff format --check
      - run: uv run ruff check --output-format=github
      - run: uv run pyrefly check --output-format=github
      - run: uv run pytest
